<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detector de Par o Impar</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input { padding: 8px; width: 100px; }
        button { padding: 8px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #resultado { margin-top: 20px; font-weight: bold; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container">
    <h2>¿Par o Impar?</h2>
    <form id="paridadForm">
        <label for="numero">Ingresa un número:</label>
        <input type="number" id="numero" required>
        <button type="submit">Verificar</button>
    </form>

    <div id="resultado"></div>
</div>

<script>
    document.getElementById('paridadForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const num = parseInt(document.getElementById('numero').value);
        const resto = num % 2;
        const resultadoDiv = document.getElementById('resultado');

        if (resto === 0) {
            resultadoDiv.innerText = `Par\nya que ${num} dividido entre 2 tiene un resto de 0, por lo que es par.`;
        } else {
            resultadoDiv.innerText = `Impar\nya que ${num} dividido entre 2 tiene un resto de 1, por lo que es impar.`;
        }
    });
</script>

</body>
</html>
